# SWAP salinitystress (saltfarmtexel) — reconstructed modern TOML port of
# tests/swap-cases/5.salinitystress. swinco=3 full warm-restart (h_init.csv +
# cml_init.csv + atmosphere state), swbotb=3 (sinus aquifer head), basic dramet=3
# drainage (2 levels), numerical heat, solute transport (swsolu=1) + Maas-Hoffman
# salinity (swsalinity=1), wofost potato, fixed irrigation, 2012-2015.

[general]
project = "saltfarmtexel"
swscre  = 0
swerror = 0

[simulation]
start_date = 2012-01-01
end_date   = 2015-12-31
nprintday  = 1

[simulation.output]
swmonth = 0
period  = 1
swres   = 0
swodat  = 0
swyrvar = 0

[simulation.numerical]
dt    = 0.04
dtmin = 1.0e-6
dtmax = 0.04

[meteorology]
file = "235.csv"
lat  = 52.928
alt  = 1.2
altw = 10.0

[meteorology.evapotranspiration]
swetr      = 0
swdivide   = 1
angstrom_a = 0.25
angstrom_b = 0.50

[meteorology.rain]
swrain   = 2
swetsine = 0

[meteorology.interception]
swinter = 0

[meteorology.evaporation]
swcfbs     = 0
swredu     = 2
cofredbo   = 0.54
cfevappond = 1.25

[drainage]
file = "swap.dra.toml"

[soil]
swsophy = 0
swhyst  = 0
swinco  = 3
swmacro = 0
rsoil   = 150.0
rsro    = 0.5
rsroexp = 1.0

# 5 sub-layers spanning 2 soil-physical layers. depth = 1000 cm; comps = 195.
sublay   = [1, 2, 3, 4, 5]
isoillay = [1, 2, 2, 2, 2]
hsublay  = [30.0, 30.0, 40.0, 50.0, 850.0]
ncomp    = [30, 30, 40, 10, 85]

[soil.initial]
gwli     = -90.0
pondini  = 0.0
pondmx   = 0.2
# swinco=3 warm restart: profiles + atmosphere state from the legacy swap.ini.
h_file   = "h_init.csv"
cml_file = "cml_init.csv"
ssnow    = 0.0
slw      = 0.0
ldwet    = 10.0
dt       = 1.0e-7
atmin7   = [14.1, 13.2, 13.8, 16.0, 18.4, 16.3, 16.6]

[soil.hydraulics]
ores    = [0.01,    0.01]
osat    = [0.4236,  0.3200]
alfa    = [0.0323,  0.0521]
npar    = [2.0321,  2.3740]
ksatfit = [124.8758, 25.0000]
lexp    = [0.057,   0.000]
alfaw   = [0.0323,  0.0521]
h_enpr  = [0.0,     0.0]
ksatexm = [124.8758, 25.0000]
bdens   = [1500.0,  1500.0]

[crop]
swcrop = 1

[[crop.rotation]]
start = 2012-04-17
end   = 2012-07-19
file  = "potatod.crp.toml"
type  = 2

[[crop.rotation]]
start = 2013-05-01
end   = 2013-08-29
file  = "potatod.crp.toml"
type  = 2

[[crop.rotation]]
start = 2014-04-28
end   = 2014-08-12
file  = "potatod.crp.toml"
type  = 2

[[crop.rotation]]
start = 2015-05-07
end   = 2015-08-18
file  = "potatod.crp.toml"
type  = 2

[bottom_boundary]
swbotb         = 3
swbotb3resvert = 0
swbotb3impl    = 0
shape          = 0.79
hdrain         = -110.0
rimlay         = 50.0
sw3            = 1
aqave          = -120.0
aqamp          = 20.0
aqtmax         = 120.0
aqper          = 365.0

[irrigation]
swirfix           = 1
fixed_events_file = "irrig.csv"

[solute]
swsolu   = 1
cpre     = 0.0
cdrain   = 1.051
swbotbc  = 1
cseep    = 15.574
ldis     = 5.0
ddif     = 0.0
tscf     = 0.5
swdc     = 0
swbr     = 0
swsoltyp = 0

[output.csv]
inlist    = "cwso,cpwso,tredwet,treddry,tredsol,conc[-5.0,-25.0,-55.0]"
inlist_tz = "conc"

[heat]
swhea     = 1
swcalt    = 2
swtopbhea = 1
swbotbhea = 1
psand = [0.935, 0.935]
psilt = [0.05,  0.05]
