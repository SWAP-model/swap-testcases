# SWAP surfacewater — reconstructed modern TOML port of tests/swap-cases/
# 6.surfacewater. swbotb=3 (Cauchy, explicit, haquif.csv), swdra=2 surface-water
# management (2 subsurface levels + simulated surface-water level + 28 management/
# weir periods), no heat, no solute, type-1 grass crop, 1997-1999.

[general]
project = "surfacewater"
swscre  = 0
swerror = 0

[simulation]
start_date = 1997-01-01
end_date   = 1999-12-31
nprintday  = 1

[simulation.output]
swmonth = 0
period  = 1
swres   = 0
swodat  = 0
swyrvar = 0

[simulation.numerical]
dt    = 0.04
dtmin = 1.0e-6
dtmax = 0.04

[meteorology]
file = "290.csv"
lat  = 52.274
alt  = 34.8
altw = 10.0

[meteorology.evapotranspiration]
swetr      = 0
swdivide   = 1
angstrom_a = 0.25
angstrom_b = 0.50

[meteorology.rain]
swrain   = 2
swetsine = 0

[meteorology.interception]
swinter = 0

[meteorology.evaporation]
swcfbs     = 0
swredu     = 1
cofredbl   = 0.35
rsigni     = 0.5
cfevappond = 1.25

[drainage]
file = "swap.dra.toml"

[soil]
swsophy = 0
swhyst  = 0
swinco  = 2
swmacro = 0
rsoil   = 600.0
rsro    = 0.5
rsroexp = 1.0

# 8 sub-layers spanning 3 soil-physical layers.
sublay   = [1, 2, 3, 4, 5, 6, 7, 8]
