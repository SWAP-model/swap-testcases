type  = 1

[[crop.rotation]]
start = 1998-01-01
end   = 1998-12-31
file  = "grass.crp.toml"
type  = 1

[[crop.rotation]]
start = 1999-01-01
end   = 1999-12-31
file  = "grass.crp.toml"
type  = 1

[bottom_boundary]
swbotb         = 3
swbotb3resvert = 0
swbotb3impl    = 0
shape          = 1.0
hdrain         = -400.0
rimlay         = 10.0
sw3            = 2
haquif_file    = "haquif.csv"

[heat]
